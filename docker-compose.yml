services:
  api:
    build:
      context: .
      dockerfile: src/FinanIA.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Data Source=/data/finania.db
      - JWT__Secret=${JWT_SECRET:-change-me-in-production-use-at-least-32-characters!!}
      - JWT__Issuer=${JWT_ISSUER:-FinanIA}
      - JWT__Audience=${JWT_AUDIENCE:-FinanIA}
      - CORS__AllowedOrigin=http://localhost:3000
    volumes:
      - db-data:/data

  web:
    build:
      context: .
      dockerfile: src/FinanIA.Web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db-data:
